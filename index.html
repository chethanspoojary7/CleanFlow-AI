<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-default>CleanFlow AI</title>
  <meta property="og:image" content="https://bolt.new/static/og_default.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  <script>
    (function () {
      try {
        var storedTheme = localStorage.getItem('cleanflow-theme');
        var preferredTheme = storedTheme === 'dark' || storedTheme === 'light' ? storedTheme : 'light';
        document.documentElement.classList.toggle('light-mode', preferredTheme === 'light');
        document.documentElement.dataset.theme = preferredTheme;
        document.documentElement.style.colorScheme = preferredTheme;
      } catch (error) {
        document.documentElement.classList.add('light-mode');
        document.documentElement.dataset.theme = 'light';
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
